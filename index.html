<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나비효과</title>
  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="libraries/p5.sound.min.js"></script>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
  <!-- 로드 순서가 중요합니다: 공용(shared) → 씬(scenes) → main 순서 -->
  <!-- shared: 다른 모든 파일이 참조하는 전역/헬퍼라 가장 먼저 -->
  <script src="js/shared/state.js"></script>
  <script src="js/shared/pixel.js"></script>
  <!-- scenes: 각 화면의 enter/update/입력 함수 모음 -->
  <script src="js/scenes/intro.js"></script>
  <script src="js/scenes/room.js"></script>
  <!-- 미니게임: 각 미니게임 씬 -->
  <script src="js/scenes/minigames/sink.js"></script>
  <script src="js/scenes/minigames/recycle.js"></script>
  <script src="js/scenes/minigames/computer.js"></script>
  <script src="js/scenes/minigames/tv.js"></script>
  <!-- 엔딩 씬 -->
  <script src="js/scenes/endings/earth.js"></script>
  <script src="js/scenes/endings/penguin.js"></script>
  <script src="js/scenes/endings/sinkhole.js"></script>
  <script src="js/scenes/endings/tree.js"></script>
  <script src="js/scenes/endings/desert.js"></script>
  <script src="js/scenes/endings/polarbear.js"></script>
  <script src="js/scenes/endings/clear.js"></script>
  <!-- main: p5 예약 함수(setup/draw/mousePressed/keyPressed). 반드시 마지막 -->
  <script src="js/main.js"></script>
</body>
</html>
